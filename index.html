<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vocab Audio Engine (111 Words)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { touch-action: manipulation; } /* Completely removes 300ms mobile tap delay */
  </style>
</head>
<body class="bg-slate-900 text-white flex flex-col justify-between min-h-screen p-4 select-none">

  <!-- Header Panel and Program Metric -->
  <header class="text-center pt-2">
    <h1 class="text-lg font-bold tracking-widest text-emerald-400">LISTEN & REPEAT</h1>
    <div class="w-full bg-slate-800 h-2 rounded-full mt-2 overflow-hidden">
      <div id="progress-bar" class="bg-emerald-500 h-full w-0 transition-all duration-300"></div>
    </div>
    <div class="text-xs text-slate-400 mt-1 font-medium tracking-wider" id="counter">Word 1 of 111</div>
  </header>

  <!-- Interactive Center Zone (Triggers Audio Instantly) -->
  <main id="card-trigger" class="flex-1 flex flex-col justify-center items-center my-6 bg-slate-800 rounded-2xl p-6 border-2 border-slate-700 active:border-emerald-500 active:bg-slate-750 transition-all shadow-xl cursor-pointer">
    <div class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2 bg-slate-900 px-3 py-1 rounded-full">Tap Center to Re-play Audio</div>
    <h2 id="current-word" class="text-4xl font-extrabold text-white text-center mb-2 tracking-tight">Loading...</h2>
    <p id="part-of-speech" class="text-emerald-400 italic text-sm mb-4 font-mono">--</p>
    <p id="word-definition" class="text-slate-300 text-center text-sm max-w-sm px-2 leading-relaxed">System initializing...</p>
    
    <!-- Dynamic 30s Pacing Counter Hook -->
    <div id="pacer" class="text-[11px] font-mono text-emerald-400 bg-slate-950 px-3 py-1.5 rounded-full mt-6 border border-slate-800 shadow-inner">⏱️ Loading loop...</div>
  </main>

  <!-- High-Surface Target Footer Button -->
  <footer class="pb-2">
    <button id="next-btn" class="w-full py-4 bg-emerald-600 active:bg-emerald-700 text-white font-bold text-lg rounded-xl shadow-lg transition-transform active:scale-[0.98]">
      Repeat Done → Next Word
    </button>
  </footer>

  <script src="words.js"></script>
  <script src="app.js"></script>
</body>
</html>
